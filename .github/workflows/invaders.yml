name: Commit Invaders

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: goblinlordx/commit-invaders@v1
        with:
          github_user_name: arnoldoaguilardeleon-eng
          theme: github-dark
          outputs: |
            dist/invaders.svg
