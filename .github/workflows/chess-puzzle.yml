name: Daily Chess Puzzle

on:
  schedule:
    # runs every day at 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-puzzle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install chess

      - name: Generate today's puzzle
        run: python scripts/generate_daily_puzzle.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-puzzle.svg daily-puzzle-info.md
          git diff --staged --quiet || git commit -m "chore: update daily chess puzzle"
          git push
