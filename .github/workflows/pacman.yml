name: Pacman contribution graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: generate pacman
        uses: abozanona/pacman-contribution-graph@v2.1.0
        with:
          github_user_name: arnoldoaguilardeleon-eng
          theme: github-dark
          output_path: dist/pacman.svg
